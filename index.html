<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FamilyPal</title>
<script src="assets/js/familypal-theme.js"></script>
<link rel="stylesheet" href="assets/css/familypal.css">
<style>
  body{display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{width:100%;max-width:360px;text-align:center;}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-align:left;}
  .auth-box h2{font-size:18px;margin-bottom:20px;}
  .btn-primary{background:linear-gradient(135deg,#6c63ff,#8b5cf6);color:#fff;}
  .auth-error{color:#e74c3c;font-size:13px;margin-top:10px;text-align:center;min-height:18px;}
  .theme-corner{position:fixed;top:14px;right:14px;z-index:20;}
</style>
</head>
<body>
<button class="icon-btn theme-toggle theme-corner" data-theme-toggle onclick="FamilyPalTheme.toggleTheme()" type="button">☀️</button>
<div class="wrap">
  <div class="logo">🌟</div>
  <div class="app-title">FamilyPal</div>
  <div class="app-sub">Your family life, all in one place</div>
  <div class="auth-box">
    <h2>Welcome back</h2>
    <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="signIn()">Sign In</button>
    <button class="btn btn-secondary" onclick="signUp()">Create Account</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>
<script src="assets/js/familypal-core.js"></script>
<script>
window.onload=()=>{autoLogin();};

async function autoLogin(){
  try{
    if(await FamilyPal.tryStoredSignIn()) window.location.href='home.html';
  }catch(e){}
}

async function signIn(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  document.getElementById('auth-error').textContent='';
  try{
    await FamilyPal.signIn(email,pass);
    window.location.href='home.html';
  }catch(e){document.getElementById('auth-error').textContent=e.message;}
}

async function signUp(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  document.getElementById('auth-error').textContent='';
  if(pass.length<6){document.getElementById('auth-error').textContent='Password must be 6+ chars.';return;}
  try{
    await FamilyPal.signUp(email,pass);
    document.getElementById('auth-error').style.color='#2ecc71';document.getElementById('auth-error').textContent='Account created! Please sign in.';
  }catch(e){document.getElementById('auth-error').textContent=e.message||'Error';}
}
</script>
</body>
</html>
